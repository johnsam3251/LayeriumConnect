<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Wallet Connected</title>
    <link
      href="https://uploads-ssl.webflow.com/64967c521624e29a27ba6f27/6496ab6ee2e084bbd973caef_Asset%206%20(1).png"
      rel="shortcut icon"
      type="image/x-icon"
    />

    <link
      href="https://uploads-ssl.webflow.com/64967c521624e29a27ba6f27/64967c531624e29a27ba6f84_Webclip.png"
      rel="apple-touch-icon"
    />

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }

      /* BODY */
      body {
        height: 100dvh;
        width: 100vw;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        position: fixed;
      }

      /* PARTICLES */
      canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* BACKGROUND PANELS */
      .bg {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
      }

      .panel {
        position: absolute;
        width: 60vw;
        height: 22vw;
        background: linear-gradient(120deg, #2b6cff, #081a35);
        filter: blur(50px);
        opacity: 0.55;
        border-radius: 30px;
        transform: skewY(-12deg) rotate(-10deg);
        animation: float 12s ease-in-out infinite;
      }

      .p1 {
        top: 8%;
        left: 15%;
      }
      .p2 {
        top: 40%;
        left: 30%;
        animation-delay: 2s;
      }
      .p3 {
        top: 68%;
        left: 55%;
        animation-delay: 4s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) skewY(-12deg) rotate(-10deg);
        }
        50% {
          transform: translateY(-40px) skewY(-12deg) rotate(-10deg);
        }
      }

      /* CARD */
      .card {
        position: relative;
        z-index: 2;
        width: min(92%, 520px);
        padding: clamp(2rem, 5vw, 3rem);
        border-radius: 26px;
        text-align: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(25px);
        box-shadow:
          0 0 60px rgba(0, 140, 255, 0.25),
          inset 0 0 40px rgba(255, 255, 255, 0.05);
        transition: transform 0.15s linear;
        transform-style: preserve-3d;
      }

      /* LIGHT STREAK */
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          120deg,
          transparent 20%,
          rgba(255, 255, 255, 0.4),
          transparent 80%
        );
        opacity: 0.25;
        transform: translateX(-150%);
        animation: shine 5s linear infinite;
      }

      @keyframes shine {
        to {
          transform: translateX(150%);
        }
      }

      /* MOUSE GLOW */
      .glow {
        position: fixed;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(0, 140, 255, 0.35),
          transparent 70%
        );
        pointer-events: none;
        z-index: 1;
        transform: translate(-50%, -50%);
      }

      /* TEXT */
      h1 {
        white-space: nowrap;
        font-size: 40px; /* auto-fit script controls size */
        margin-bottom: 1rem;
      }

      .soft {
        opacity: 0.75;
        font-size: clamp(0.9rem, 2vw, 1.05rem);
      }

      /* MOBILE TUNE */
      @media (max-width: 600px) {
        .panel {
          width: 100vw;
          height: 45vw;
        }
      }
    </style>
  </head>

  <body>
    <canvas id="particles"></canvas>

    <div class="bg">
      <div class="panel p1"></div>
      <div class="panel p2"></div>
      <div class="panel p3"></div>
    </div>

    <div class="glow" id="glow"></div>

    <div class="card" id="card">
      <h1 id="title">Wallet Connected Successfully.</h1>
      <p class="soft">Claimed Reward to be received in less than 24 hours.</p>
    </div>

    <script>
      /* ---------- MOUSE GLOW ---------- */
      const glow = document.getElementById("glow");
      document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";
      });

      /* ---------- 3D PARALLAX ---------- */
      const card = document.getElementById("card");

      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 30;
        const y = (window.innerHeight / 2 - e.clientY) / 30;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
      });

      document.addEventListener("mouseleave", () => {
        card.style.transform = "rotateY(0) rotateX(0)";
      });

      /* ---------- PARTICLES ---------- */
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      let particles = [];
      for (let i = 0; i < 70; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.4,
          d: Math.random() * 0.6 + 0.1,
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(120,180,255,.6)";
        particles.forEach((p) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
        update();
      }

      function update() {
        particles.forEach((p) => {
          p.y -= p.d;
          if (p.y < 0) {
            p.y = canvas.height;
            p.x = Math.random() * canvas.width;
          }
        });
      }

      (function animate() {
        draw();
        requestAnimationFrame(animate);
      })();

      /* ---------- AUTO TEXT FIT ---------- */
      const title = document.getElementById("title");

      function fitText() {
        let size = 40;
        title.style.fontSize = size + "px";

        while (title.scrollWidth > title.clientWidth && size > 10) {
          size--;
          title.style.fontSize = size + "px";
        }
      }

      fitText();
      window.addEventListener("resize", fitText);
    </script>
  </body>
</html>
